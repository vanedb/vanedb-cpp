name: Build and Test

on:
  push:
    branches: [ main, develop, "claude/**" ]
  pull_request:
    branches: [ main, develop ]

# Restrict permissions for security
permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    name: ${{ matrix.os }} - ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - GCC
          - os: ubuntu-latest
            compiler: gcc
            build_type: Release
          # Linux - Clang
          - os: ubuntu-latest
            compiler: clang
            build_type: Release
          # macOS - Apple Clang (tests ARM NEON on M-series)
          - os: macos-latest
            compiler: clang
            build_type: Release
          # Windows - MSVC (tests AVX2 on x64)
          - os: windows-latest
            compiler: msvc
            build_type: Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Cache CMake build
      uses: actions/cache@v6
      with:
        path: |
          build/_deps
        key: ${{ runner.os }}-${{ matrix.compiler }}-vanedb-deps-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.compiler }}-vanedb-deps-

    - name: Set up compiler (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV
        else
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
        fi

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build
      run: |
        cmake --build build --config ${{ matrix.build_type }} --parallel

    - name: Run tests
      run: |
        cd build && ctest --output-on-failure --build-config ${{ matrix.build_type }}

    - name: Run benchmarks (Unix)
      if: runner.os != 'Windows'
      run: |
        cd build
        ./bench_distance --benchmark_min_time=0.05s --benchmark_filter=BM_L2/768 --benchmark_format=json > bench_distance.json
        ./bench_vector_store --benchmark_min_time=0.05s --benchmark_filter=BM_VectorStore_Search_L2/100 --benchmark_format=json > bench_vector_store.json
        ./bench_hnsw_index --benchmark_min_time=0.05s --benchmark_filter=BM_HNSW_Search/100 --benchmark_format=json > bench_hnsw_index.json
        cat bench_distance.json bench_vector_store.json bench_hnsw_index.json

    - name: Run benchmarks (Windows)
      if: runner.os == 'Windows'
      run: |
        cd build
        .\${{ matrix.build_type }}\bench_distance.exe --benchmark_min_time=0.05s --benchmark_filter=BM_L2/768 --benchmark_format=json > bench_distance.json
        .\${{ matrix.build_type }}\bench_vector_store.exe --benchmark_min_time=0.05s --benchmark_filter=BM_VectorStore_Search_L2/100 --benchmark_format=json > bench_vector_store.json
        .\${{ matrix.build_type }}\bench_hnsw_index.exe --benchmark_min_time=0.05s --benchmark_filter=BM_HNSW_Search/100 --benchmark_format=json > bench_hnsw_index.json

    - name: Upload benchmark results
      uses: actions/upload-artifact@v7
      with:
        name: benchmarks-${{ matrix.os }}-${{ matrix.compiler }}
        path: build/bench_*.json
        retention-days: 90

  python-tests:
    name: Python Bindings Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy

    - name: Configure and build with Python bindings
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DVANEDB_BUILD_PYTHON=ON -DVANEDB_BUILD_TESTS=OFF -DVANEDB_BUILD_BENCHMARKS=OFF -DVANEDB_BUILD_EXAMPLES=OFF

    - name: Build
      run: |
        cmake --build build --config Release --parallel

    - name: Run Python tests (Unix)
      if: runner.os != 'Windows'
      run: |
        PYTHONPATH=build pytest tests/test_python_bindings.py -v

    - name: Run Python tests (Windows)
      if: runner.os == 'Windows'
      run: |
        $env:PYTHONPATH = "build\Release"
        pytest tests/test_python_bindings.py -v

  sanitizers:
    name: Sanitizer Checks (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Configure CMake with sanitizer
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
          -DVANEDB_BUILD_PYTHON=OFF

    - name: Build
      run: |
        cmake --build build --parallel

    - name: Run tests with sanitizer
      run: |
        cd build && ctest --output-on-failure
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install lcov
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov

    - name: Configure CMake with coverage
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DVANEDB_COVERAGE=ON \
          -DVANEDB_BUILD_PYTHON=OFF

    - name: Build
      run: |
        cmake --build build --parallel

    - name: Run tests
      run: |
        cd build && ctest --output-on-failure

    - name: Capture coverage
      run: |
        lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,negative
        lcov --remove coverage.info \
          '/usr/*' \
          '*/external/*' \
          '*/build/_deps/*' \
          '*/tests/*' \
          '*/benchmarks/*' \
          '*/examples/*' \
          '*/python/*' \
          --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: coverage.info
        flags: core
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  linux-arm64:
    name: Linux ARM64 (Native)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DVANEDB_BUILD_PYTHON=OFF

    - name: Build
      run: cmake --build build --parallel

    - name: Run tests
      run: ctest --test-dir build --output-on-failure

  ios-build:
    name: iOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Configure CMake for iOS
      run: |
        cmake -B build-ios \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DVANEDB_BUILD_TESTS=OFF \
          -DVANEDB_BUILD_BENCHMARKS=OFF \
          -DVANEDB_BUILD_PYTHON=OFF \
          -DVANEDB_BUILD_EXAMPLES=OFF \
          -GXcode

    - name: Build for iOS
      run: |
        cmake --build build-ios --config Release -- -sdk iphoneos -arch arm64 CODE_SIGNING_ALLOWED=NO

    - name: Verify iOS build
      run: |
        echo "iOS arm64 build completed successfully"
        ls -la build-ios/Release* 2>/dev/null || echo "Header-only library verified"

  android-build:
    name: Android (arm64-v8a)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Android NDK
      uses: android-actions/setup-android@v4

    - name: Install NDK
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Configure CMake for Android
      run: |
        cmake -B build-android \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DVANEDB_BUILD_TESTS=OFF \
          -DVANEDB_BUILD_BENCHMARKS=OFF \
          -DVANEDB_BUILD_PYTHON=OFF \
          -DVANEDB_BUILD_EXAMPLES=OFF

    - name: Build for Android
      run: |
        cmake --build build-android --config Release --parallel

    - name: Verify Android binary
      run: |
        # Check that the build completed for Android ARM64
        file build-android/libvanedb* 2>/dev/null || echo "Header-only library - checking compilation succeeded"
        echo "Android arm64-v8a build completed successfully"

  android-x86_64-build:
    name: Android (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Android NDK
      uses: android-actions/setup-android@v4

    - name: Install NDK
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Configure CMake for Android x86_64
      run: |
        cmake -B build-android-x86_64 \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=x86_64 \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DVANEDB_BUILD_TESTS=OFF \
          -DVANEDB_BUILD_BENCHMARKS=OFF \
          -DVANEDB_BUILD_PYTHON=OFF \
          -DVANEDB_BUILD_EXAMPLES=OFF

    - name: Build for Android x86_64
      run: |
        cmake --build build-android-x86_64 --config Release --parallel

    - name: Verify Android x86_64 binary
      run: |
        echo "Android x86_64 build completed successfully"

  c-api:
    name: C API (extern "C") - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Cache CMake deps
      uses: actions/cache@v6
      with:
        path: build-capi/_deps
        key: ${{ runner.os }}-capi-deps-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: ${{ runner.os }}-capi-deps-

    - name: Configure CMake (C API)
      run: cmake -B build-capi -DCMAKE_BUILD_TYPE=Release -DVANEDB_BUILD_CAPI=ON -DVANEDB_BUILD_BENCHMARKS=OFF -DVANEDB_BUILD_EXAMPLES=OFF -DVANEDB_BUILD_PYTHON=OFF

    # --config Release is required for MSVC (multi-config generator); harmless on single-config Unix generators.
    - name: Build C API smoke test
      run: cmake --build build-capi --target test_capi --config Release --parallel

    - name: Run C API test
      run: ctest --test-dir build-capi -R capi --build-config Release --output-on-failure
