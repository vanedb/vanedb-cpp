# Codecov configuration for quiverdb
# Documentation: https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: 70..100

  status:
    project:
      default:
        target: auto
        threshold: 1%
        base: auto
    patch:
      default:
        target: auto
        threshold: 1%
        base: auto

ignore:
  - "tests/**/*"
  - "benchmarks/**/*"
  - "examples/**/*"
  - "python/**/*"
  - "external/**/*"
  - "build/**/*"
  - "**/_deps/**/*"

comment:
  layout: "reach,diff,flags,tree,footer"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

# Scope coverage measurement to library source (excludes tests/python/etc.).
flags:
  core:
    paths:
      - src/core/
    carryforward: true
